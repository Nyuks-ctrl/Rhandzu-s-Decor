<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Admin · Rhandzu's Decor</title>
  <!-- No index for search engines — keep this page private -->
  <meta name="robots" content="noindex, nofollow"/>
  <link rel="icon" href="assets/Logo.jpg" type="image/jpeg"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    body { background: var(--dark); }

    /* ─── ADMIN LAYOUT ─── */
    .admin-wrap {
      max-width: 540px; margin: 0 auto;
      padding: 1.5rem 1.2rem 4rem;
      display: none;
    }
    .admin-wrap.visible { display: block; }

    .admin-page-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1.8rem;
    }
    .admin-page-title {
      font-family: 'Playfair Display', serif;
      color: var(--white); font-size: 1.4rem;
    }
    .admin-page-title span { color: var(--gold); }
    .logout-btn {
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.5); padding: 0.45rem 1rem;
      border-radius: 20px; font-size: 0.75rem; cursor: pointer;
      transition: all 0.2s; font-family: 'DM Sans', sans-serif;
    }
    .logout-btn:hover { color: #f87171; border-color: rgba(248,113,113,0.4); }

    /* ─── UPLOAD ZONE ─── */
    .upload-zone {
      border: 2px dashed rgba(245,200,66,0.35);
      border-radius: var(--radius); padding: 2.2rem 1rem;
      text-align: center; cursor: pointer; transition: all 0.25s;
      margin-bottom: 1.5rem; background: rgba(245,200,66,0.03);
    }
    .upload-zone:hover, .upload-zone.drag-over {
      border-color: var(--gold); background: rgba(245,200,66,0.07);
    }
    .upload-icon { font-size: 2.5rem; margin-bottom: 0.6rem; }
    .upload-zone p {
      color: rgba(255,255,255,0.5); font-size: 0.84rem; line-height: 1.7;
    }
    .upload-zone strong { color: var(--gold); }

    /* ─── PREVIEW GRID ─── */
    .preview-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 0.5rem; margin-bottom: 1.2rem;
    }
    .preview-thumb {
      aspect-ratio: 1; border-radius: 8px; overflow: hidden;
      position: relative; background: rgba(255,255,255,0.05);
    }
    .preview-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .remove-thumb {
      position: absolute; top: 4px; right: 4px;
      background: rgba(220,38,38,0.85); color: #fff; border: none;
      border-radius: 50%; width: 22px; height: 22px; cursor: pointer;
      font-size: 0.72rem;
      display: flex; align-items: center; justify-content: center;
    }

    /* ─── DIVIDER ─── */
    .divider {
      border: none; border-top: 1px solid rgba(255,255,255,0.08);
      margin: 2rem 0;
    }

    /* ─── POST MANAGER ─── */
    .manager-title {
      font-family: 'Playfair Display', serif;
      color: var(--gold); font-size: 1.1rem; margin-bottom: 1rem;
    }
    .post-item {
      background: rgba(255,255,255,0.05); border-radius: var(--radius-sm);
      padding: 0.85rem 1rem; margin-bottom: 0.75rem;
      display: flex; align-items: center; gap: 0.75rem;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .post-thumb {
      width: 52px; height: 52px; border-radius: 8px;
      object-fit: cover; flex-shrink: 0;
    }
    .post-thumb-placeholder {
      width: 52px; height: 52px; border-radius: 8px;
      background: rgba(245,200,66,0.12);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; flex-shrink: 0;
    }
    .post-info { flex: 1; min-width: 0; }
    .post-info-title {
      color: var(--white); font-size: 0.82rem; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .post-info-meta { color: rgba(255,255,255,0.4); font-size: 0.72rem; margin-top: 3px; }
    .delete-btn {
      background: rgba(220,38,38,0.15); color: #f87171; border: none;
      padding: 0.45rem 0.85rem; border-radius: 8px; font-size: 0.74rem;
      cursor: pointer; transition: all 0.2s; white-space: nowrap;
      font-family: 'DM Sans', sans-serif;
    }
    .delete-btn:hover { background: rgba(220,38,38,0.35); }

    /* ─── BACK LINK ─── */
    .back-link {
      display: inline-flex; align-items: center; gap: 0.4rem;
      color: rgba(255,255,255,0.4); font-size: 0.78rem;
      text-decoration: none; margin-bottom: 1.5rem;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--gold); }

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
  </style>
</head>
<body>

  <!-- ─── LOGIN OVERLAY ─── -->
  <div class="modal-overlay" id="loginOverlay">
    <div class="modal-box">
      <h2>Admin Access 🔐</h2>
      <p>Enter your password to manage posts &amp; uploads.</p>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input
          type="password" class="form-input" id="loginPassword"
          placeholder="••••••••"
          onkeydown="if(event.key==='Enter') attemptLogin()"
          autocomplete="current-password"
        />
      </div>
      <div class="modal-actions">
        <button class="submit-btn" style="flex:1" onclick="attemptLogin()">Login</button>
        <a href="index.html" class="cancel-btn" style="display:flex;align-items:center;justify-content:center;text-decoration:none">Cancel</a>
      </div>
      <p class="modal-error" id="loginError">❌ Incorrect password. Try again.</p>
    </div>
  </div>

  <!-- ─── ADMIN PANEL ─── -->
  <div class="admin-wrap" id="adminPanel">

    <!-- Header -->
    <div class="admin-page-header">
      <div class="admin-page-title">Studio <span>Admin</span></div>
      <button class="logout-btn" onclick="logout()">← Back to Site</button>
    </div>

    <a href="index.html" class="back-link">← View live site</a>

    <!-- Upload Zone -->
    <div
      class="upload-zone" id="uploadZone"
      onclick="triggerFileInput()"
      ondragover="handleDragOver(event)"
      ondrop="handleDrop(event)"
      ondragleave="handleDragLeave()"
    >
      <div class="upload-icon">📷</div>
      <p>
        <strong>Tap to choose photos</strong><br/>
        or drag &amp; drop here<br/>
        <span style="font-size:0.74rem;opacity:0.5">JPG · PNG · WEBP · Multiple allowed</span>
      </p>
    </div>
    <input
      type="file" id="fileInput" accept="image/*" multiple
      onchange="onFileChange(this)" style="display:none"
    />

    <!-- Preview -->
    <div class="preview-grid" id="previewGrid"></div>

    <!-- Form -->
    <div class="form-group">
      <label class="form-label">Event Category *</label>
      <select class="form-select" id="postCategory">
        <option value="">Select category…</option>
        <option>Wedding</option>
        <option>Kiddies Party</option>
        <option>Baby Shower</option>
        <option>Party</option>
        <option>Other</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">Post Title</label>
      <input
        type="text" class="form-input" id="postTitle"
        placeholder="e.g. Beige Themed Wedding · Hatfield"
      />
    </div>

    <div class="form-group">
      <label class="form-label">Description <span style="opacity:0.4">(optional)</span></label>
      <textarea
        class="form-textarea" id="postDesc"
        placeholder="Tell clients what's included — backdrop, balloon arch, jumping castle, catering…"
      ></textarea>
    </div>

    <button class="submit-btn" id="submitBtn" onclick="submitPost()">
      ✦ Publish Post
    </button>

    <hr class="divider"/>

    <!-- Post Manager -->
    <div class="manager-title">📋 Manage Posts</div>
    <div id="adminPostList"></div>

  </div>

  <!-- ─── TOAST ─── -->
  <div class="toast" id="toast"></div>

  <script src="js/admin.js"></script>
</body>
</html>
