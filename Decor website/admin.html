<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <!-- Prevent search engines indexing this page -->
  <meta name="robots" content="noindex, nofollow"/>
  <title>Admin — Rhandzu's Decor</title>
  <link rel="shortcut icon" href="assets/Logo.jpg" type="image/x-icon"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>

  <style>
    /* ─── ADMIN-ONLY STYLES ─── */
    body { background: #0a1424; }

    .admin-wrap {
      max-width: 560px;
      margin: 0 auto;
      padding: 1.5rem 1.2rem 4rem;
    }

    /* Token banner */
    .token-banner {
      display: none;
      background: rgba(245,200,66,0.12);
      border: 1px solid rgba(245,200,66,0.4);
      color: var(--gold);
      padding: 0.85rem 1rem;
      border-radius: var(--radius-sm);
      font-size: 0.82rem;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    .token-banner.warn { border-color: rgba(248,113,113,0.5); color: #fca5a5; background: rgba(248,113,113,0.08); }

    /* Section headers */
    .admin-section-title {
      font-family: 'Playfair Display', serif;
      color: var(--gold);
      font-size: 1.1rem;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid rgba(245,200,66,0.2);
    }

    /* Upload zone */
    .upload-zone {
      border: 2px dashed rgba(245,200,66,0.35);
      border-radius: var(--radius);
      padding: 2rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.25s;
      margin-bottom: 1.2rem;
      background: rgba(245,200,66,0.03);
    }
    .upload-zone:hover,
    .upload-zone.drag-over {
      border-color: var(--gold);
      background: rgba(245,200,66,0.07);
    }
    .upload-icon { font-size: 2.4rem; margin-bottom: 0.5rem; }
    .upload-zone p {
      color: rgba(255,255,255,0.55);
      font-size: 0.83rem;
      line-height: 1.65;
    }
    .upload-zone strong { color: var(--gold); }
    #fileInput { display: none; }

    /* Preview grid */
    .preview-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.5rem;
      margin-bottom: 1.2rem;
    }
    .preview-thumb {
      aspect-ratio: 1;
      border-radius: 8px;
      overflow: hidden;
      position: relative;
      background: rgba(255,255,255,0.05);
    }
    .preview-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .remove-btn {
      position: absolute;
      top: 4px; right: 4px;
      background: rgba(220,38,38,0.88);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 22px; height: 22px;
      cursor: pointer;
      font-size: 0.72rem;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    /* Form elements */
    .form-group { margin-bottom: 1.1rem; }
    .form-label {
      display: block;
      color: rgba(255,255,255,0.6);
      font-size: 0.75rem;
      font-weight: 500;
      margin-bottom: 0.4rem;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }
    .form-input,
    .form-select,
    .form-textarea {
      width: 100%;
      padding: 0.75rem 1rem;
      border-radius: var(--radius-sm);
      background: rgba(255,255,255,0.07);
      border: 1.5px solid rgba(255,255,255,0.1);
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      transition: border-color 0.2s;
      outline: none;
    }
    .form-input:focus,
    .form-select:focus,
    .form-textarea:focus {
      border-color: var(--gold);
    }
    .form-select option { background: #0e1a2b; color: var(--white); }
    .form-textarea { min-height: 85px; resize: vertical; }

    /* Progress message */
    #progressMsg {
      display: none;
      text-align: center;
      color: var(--gold);
      font-size: 0.82rem;
      margin-bottom: 0.75rem;
    }

    /* Submit button */
    .submit-btn {
      width: 100%;
      padding: 1rem;
      border-radius: 25px;
      border: none;
      background: var(--gold);
      color: var(--dark);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.22s;
      letter-spacing: 0.02em;
    }
    .submit-btn:hover    { background: var(--gold-dark); }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Manage posts list */
    .posts-manager { margin-top: 2.5rem; }
    .post-item {
      background: rgba(255,255,255,0.05);
      border-radius: var(--radius-sm);
      padding: 0.85rem 1rem;
      margin-bottom: 0.7rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .post-thumb {
      width: 50px; height: 50px;
      border-radius: 8px;
      object-fit: cover;
      flex-shrink: 0;
    }
    .post-thumb-placeholder {
      width: 50px; height: 50px;
      border-radius: 8px;
      background: rgba(245,200,66,0.12);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem;
      flex-shrink: 0;
    }
    .post-info { flex: 1; min-width: 0; }
    .post-info-title {
      color: var(--white);
      font-size: 0.82rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .post-info-meta {
      color: rgba(255,255,255,0.38);
      font-size: 0.7rem;
      margin-top: 2px;
    }
    .delete-btn {
      background: rgba(220,38,38,0.18);
      color: #f87171;
      border: none;
      padding: 0.4rem 0.75rem;
      border-radius: 8px;
      font-size: 0.72rem;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      font-family: 'DM Sans', sans-serif;
    }
    .delete-btn:hover { background: rgba(220,38,38,0.35); }

    .no-posts {
      color: rgba(255,255,255,0.35);
      font-size: 0.82rem;
      text-align: center;
      padding: 1.5rem 0;
    }

    /* Back link */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      color: rgba(255,255,255,0.45);
      font-size: 0.78rem;
      text-decoration: none;
      margin-bottom: 1.8rem;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--gold); }

    /* Divider */
    .divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.07);
      margin: 2rem 0;
    }
  </style>
</head>
<body>

<!-- ─── HEADER ─── -->
<header class="site-header">
  <a class="header-brand" href="index.html">
    <div class="header-logo-circle">R</div>
    <div>
      <div class="brand-name">Rhandzu's Decor</div>
      <div class="brand-sub">Admin Panel</div>
    </div>
  </a>
  <nav class="header-nav">
    <a class="nav-btn" href="index.html">← Live Site</a>
  </nav>
</header>

<!-- ─── ADMIN CONTENT ─── -->
<div class="admin-wrap">

  <a href="index.html" class="back-link">← Back to live site</a>

  <!-- Token warning banner (shown by JS if token not set) -->
  <div class="token-banner" id="tokenBanner"></div>

  <!-- ── UPLOAD NEW POST ── -->
  <div class="admin-section-title">📸 Upload New Post</div>

  <div class="upload-zone" id="uploadZone">
    <div class="upload-icon">📷</div>
    <p>
      <strong>Tap to choose photos</strong><br/>
      or drag &amp; drop here<br/>
      <span style="font-size:0.72rem;opacity:0.55">JPG · PNG · WEBP · Multiple allowed</span>
    </p>
  </div>
  <input type="file" id="fileInput" accept="image/*" multiple/>

  <!-- Photo previews -->
  <div class="preview-grid" id="previewGrid"></div>

  <!-- Form fields -->
  <div class="form-group">
    <label class="form-label" for="postCategory">Event Category *</label>
    <select class="form-select" id="postCategory">
      <option value="">Select category...</option>
      <option>Wedding</option>
      <option>Kiddies Party</option>
      <option>Baby Shower</option>
      <option>Party</option>
      <option>Other</option>
    </select>
  </div>

  <div class="form-group">
    <label class="form-label" for="postTitle">Post Title</label>
    <input type="text" class="form-input" id="postTitle"
      placeholder="e.g. Beige Themed Wedding Setup"/>
  </div>

  <div class="form-group">
    <label class="form-label" for="postDesc">Description (optional)</label>
    <textarea class="form-textarea" id="postDesc"
      placeholder="Describe this setup, what's included, packages, etc."></textarea>
  </div>

  <div id="progressMsg"></div>
  <button class="submit-btn" id="submitBtn" onclick="submitPost()">
    ✦ Publish Post
  </button>

  <hr class="divider"/>

  <!-- ── MANAGE POSTS ── -->
  <div class="posts-manager">
    <div class="admin-section-title">🗂 Manage Posts</div>
    <div id="adminPostList"></div>
  </div>

</div>

<!-- ─── TOAST ─── -->
<div class="toast" id="toast"></div>

<script src="js/admin.js"></script>
</body>
</html>
