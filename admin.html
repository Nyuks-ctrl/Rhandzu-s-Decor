<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Studio · Rhandzu's Decor</title>
  <meta name="robots" content="noindex, nofollow"/>
  <link rel="icon" href="assets/Logo.jpg" type="image/jpeg"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
  <style>

    /* ── Page shell ── */
    body { background: #0a0f1c; min-height: 100vh; }

    /* ── Login overlay ── */
    .login-screen {
      display: none; position: fixed; inset: 0; z-index: 300;
      background: #0a0f1c;
      align-items: center; justify-content: center;
      flex-direction: column; padding: 2rem;
    }
    .login-screen.visible { display: flex; }

    .login-logo {
      width: 64px; height: 64px; border-radius: 50%;
      object-fit: cover; border: 2px solid rgba(245,197,24,0.4);
      margin-bottom: 1.5rem;
    }
    .login-title {
      font-family: 'Cormorant Garamond', serif;
      color: #fff; font-size: 1.6rem; font-weight: 400;
      margin-bottom: 0.3rem; text-align: center;
    }
    .login-sub {
      color: rgba(255,255,255,0.35); font-size: 0.82rem;
      margin-bottom: 2rem; text-align: center; line-height: 1.6;
    }
    .login-box {
      width: 100%; max-width: 320px;
      display: flex; flex-direction: column; gap: 0.75rem;
    }
    .pw-wrap {
      position: relative;
    }
    .pw-wrap input {
      width: 100%; padding: 0.9rem 3rem 0.9rem 1rem;
      border-radius: 10px;
      background: rgba(255,255,255,0.07);
      border: 1.5px solid rgba(255,255,255,0.1);
      color: #fff; font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem; outline: none; transition: border-color 0.2s;
    }
    .pw-wrap input:focus { border-color: var(--gold, #F5C518); }
    .pw-toggle {
      position: absolute; right: 0.9rem; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: rgba(255,255,255,0.35); padding: 0; line-height: 1;
      transition: color 0.2s;
    }
    .pw-toggle:hover { color: rgba(255,255,255,0.7); }

    .login-btn {
      width: 100%; padding: 0.9rem; border-radius: 25px; border: none;
      background: #F5C518; color: #0a0f1c;
      font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 600;
      cursor: pointer; transition: background 0.2s;
    }
    .login-btn:hover { background: #d4aa10; }
    .login-error {
      color: #f87171; font-size: 0.78rem;
      display: none; align-items: center; gap: 0.4rem;
    }
    .login-back {
      margin-top: 1rem; color: rgba(255,255,255,0.3); font-size: 0.75rem;
      text-decoration: none; display: flex; align-items: center; gap: 0.4rem;
      transition: color 0.2s;
    }
    .login-back:hover { color: rgba(255,255,255,0.6); }

    @keyframes shake {
      0%,100%{transform:translateX(0)}
      20%{transform:translateX(-6px)}
      40%{transform:translateX(6px)}
      60%{transform:translateX(-4px)}
      80%{transform:translateX(4px)}
    }

    /* ── Admin layout ── */
    .admin-layout {
      display: none; min-height: 100vh;
      flex-direction: column;
    }
    .admin-layout.visible { display: flex; }

    /* Admin header */
    .admin-header {
      position: sticky; top: 0; z-index: 50;
      background: rgba(10,15,28,0.96); backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(245,197,24,0.15);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.85rem 1.2rem;
    }
    .admin-header-brand {
      display: flex; align-items: center; gap: 0.6rem;
    }
    .admin-header-logo {
      width: 36px; height: 36px; border-radius: 50%;
      object-fit: cover; border: 1.5px solid rgba(245,197,24,0.4);
    }
    .admin-header-title {
      font-family: 'Cormorant Garamond', serif;
      color: #fff; font-size: 1rem; font-weight: 600; line-height: 1.1;
    }
    .admin-header-sub {
      font-size: 0.62rem; color: rgba(245,197,24,0.6);
      text-transform: uppercase; letter-spacing: 0.1em;
    }
    .admin-header-actions { display: flex; gap: 0.5rem; align-items: center; }
    .view-site-btn {
      display: flex; align-items: center; gap: 0.4rem;
      color: rgba(255,255,255,0.45); font-size: 0.75rem;
      text-decoration: none; padding: 0.4rem 0.8rem;
      border: 1px solid rgba(255,255,255,0.1); border-radius: 20px;
      transition: all 0.2s;
    }
    .view-site-btn:hover { color: #fff; border-color: rgba(255,255,255,0.25); }
    .logout-btn {
      background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.2);
      color: #f87171; padding: 0.4rem 0.85rem; border-radius: 20px;
      font-size: 0.73rem; cursor: pointer; transition: all 0.2s;
      font-family: 'DM Sans', sans-serif;
    }
    .logout-btn:hover { background: rgba(248,113,113,0.2); }

    /* Status bar */
    .status-bar {
      display: none; align-items: center; gap: 0.5rem;
      padding: 0.6rem 1.2rem; font-size: 0.78rem; font-weight: 500;
    }
    .status-bar.status-loading { background: rgba(245,197,24,0.08); color: rgba(245,197,24,0.8); display: flex; }
    .status-bar.status-saving  { background: rgba(45,108,200,0.1);  color: #7eb3f7; display: flex; }
    .status-bar.status-success { background: rgba(37,211,102,0.08); color: #4ade80; display: flex; }
    .status-bar.status-error   { background: rgba(239,68,68,0.08);  color: #f87171; display: flex; }

    /* Content */
    .admin-body {
      flex: 1; padding: 1.5rem 1.2rem 4rem;
      max-width: 560px; width: 100%; margin: 0 auto;
    }

    /* Section headings */
    .admin-section-title {
      font-family: 'Cormorant Garamond', serif;
      color: rgba(255,255,255,0.9); font-size: 1.15rem; font-weight: 600;
      margin-bottom: 1rem;
      display: flex; align-items: center; gap: 0.6rem;
    }
    .admin-section-title svg { opacity: 0.5; }

    .admin-divider {
      border: none; border-top: 1px solid rgba(255,255,255,0.07);
      margin: 2rem 0;
    }

    /* Upload zone */
    .upload-zone {
      border: 1.5px dashed rgba(245,197,24,0.3);
      border-radius: 14px; padding: 2.2rem 1rem;
      text-align: center; cursor: pointer;
      transition: all 0.2s; margin-bottom: 1rem;
      background: rgba(245,197,24,0.02);
      display: flex; flex-direction: column; align-items: center; gap: 0.75rem;
    }
    .upload-zone:hover, .upload-zone.drag-over {
      border-color: #F5C518; background: rgba(245,197,24,0.06);
    }
    .upload-zone-icon {
      width: 48px; height: 48px; border-radius: 50%;
      background: rgba(245,197,24,0.1);
      display: flex; align-items: center; justify-content: center;
      color: #F5C518;
    }
    .upload-zone-label {
      font-size: 0.88rem; color: rgba(255,255,255,0.7); line-height: 1.6;
    }
    .upload-zone-label strong { color: #F5C518; font-weight: 600; }
    .upload-zone-hint { font-size: 0.7rem; color: rgba(255,255,255,0.25); }

    /* Preview grid */
    .preview-grid {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 0.4rem; margin-bottom: 1.2rem;
    }
    .preview-thumb {
      aspect-ratio: 1; border-radius: 8px; overflow: hidden;
      position: relative; background: rgba(255,255,255,0.05);
    }
    .preview-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .remove-thumb {
      position: absolute; top: 4px; right: 4px;
      width: 20px; height: 20px; border-radius: 50%;
      background: rgba(10,15,28,0.85); border: none;
      color: rgba(255,255,255,0.8); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .remove-thumb:hover { background: #dc2626; color: #fff; }

    /* Form */
    .form-group { margin-bottom: 1rem; }
    .form-label {
      display: block; color: rgba(255,255,255,0.45); font-size: 0.72rem;
      font-weight: 500; margin-bottom: 0.4rem; letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .form-input, .form-select, .form-textarea {
      width: 100%; padding: 0.75rem 1rem; border-radius: 10px;
      background: rgba(255,255,255,0.06); border: 1.5px solid rgba(255,255,255,0.09);
      color: #fff; font-family: 'DM Sans', sans-serif; font-size: 0.87rem;
      outline: none; transition: border-color 0.2s;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus {
      border-color: #F5C518;
    }
    .form-input::placeholder, .form-textarea::placeholder { color: rgba(255,255,255,0.18); }
    .form-select option { background: #111827; }
    .form-textarea { min-height: 80px; resize: vertical; line-height: 1.6; }

    /* Publish button */
    .publish-btn {
      width: 100%; padding: 1rem; border-radius: 25px; border: none;
      background: #F5C518; color: #0a0f1c;
      font-family: 'DM Sans', sans-serif; font-size: 0.92rem; font-weight: 600;
      cursor: pointer; transition: all 0.22s;
      display: flex; align-items: center; justify-content: center; gap: 0.55rem;
      letter-spacing: 0.02em;
    }
    .publish-btn:hover:not(:disabled) { background: #d4aa10; transform: translateY(-1px); }
    .publish-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .spinner {
      width: 16px; height: 16px; border-radius: 50%;
      border: 2px solid rgba(10,15,28,0.3);
      border-top-color: #0a0f1c;
      animation: spin 0.65s linear infinite; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Post manager */
    .post-item {
      display: flex; align-items: center; gap: 0.85rem;
      padding: 0.85rem 0; border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .post-item:last-child { border-bottom: none; }
    .post-thumb {
      width: 48px; height: 48px; border-radius: 8px;
      object-fit: cover; flex-shrink: 0;
      background: rgba(255,255,255,0.05);
    }
    .post-thumb-ph {
      width: 48px; height: 48px; border-radius: 8px; flex-shrink: 0;
      background: rgba(245,197,24,0.08);
      display: flex; align-items: center; justify-content: center;
      color: rgba(245,197,24,0.6);
    }
    .post-info { flex: 1; min-width: 0; }
    .post-info-title {
      color: rgba(255,255,255,0.85); font-size: 0.83rem; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .post-info-meta { color: rgba(255,255,255,0.3); font-size: 0.7rem; margin-top: 3px; }
    .delete-btn {
      display: flex; align-items: center; gap: 0.35rem;
      background: none; border: 1px solid rgba(248,113,113,0.2);
      color: rgba(248,113,113,0.7); padding: 0.35rem 0.75rem;
      border-radius: 8px; font-size: 0.72rem; cursor: pointer;
      transition: all 0.2s; white-space: nowrap;
      font-family: 'DM Sans', sans-serif;
    }
    .delete-btn:hover { background: rgba(248,113,113,0.1); color: #f87171; border-color: rgba(248,113,113,0.4); }

    .no-posts {
      text-align: center; padding: 2.5rem 1rem;
      color: rgba(255,255,255,0.25); font-size: 0.83rem; line-height: 1.7;
      display: flex; flex-direction: column; align-items: center;
    }

    /* Toast */
    .toast {
      position: fixed; bottom: 1.5rem; left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #111827; color: #fff;
      padding: 0.75rem 1.4rem; border-radius: 25px; font-size: 0.82rem;
      border: 1px solid rgba(245,197,24,0.2);
      transition: transform 0.32s cubic-bezier(0.34,1.56,0.64,1);
      z-index: 9999; white-space: nowrap; pointer-events: none;
    }
    .toast.show    { transform: translateX(-50%) translateY(0); }
    .toast.success { border-color: rgba(74,222,128,0.4); }
    .toast.error   { border-color: rgba(248,113,113,0.4); }

    @media (min-width: 600px) {
      .preview-grid { grid-template-columns: repeat(5, 1fr); }
    }
  </style>
</head>
<body>

  <!-- ══ LOGIN SCREEN ══ -->
  <div class="login-screen" id="loginOverlay">
    <img src="assets/Logo.jpg" alt="Logo" class="login-logo"/>
    <h1 class="login-title">Studio Access</h1>
    <p class="login-sub">Enter your password to manage<br/>posts and uploads.</p>

    <div class="login-box">
      <div class="pw-wrap">
        <input
          type="password" id="loginPassword"
          placeholder="Password"
          autocomplete="current-password"
          onkeydown="if(event.key==='Enter') attemptLogin()"
        />
        <button class="pw-toggle" onclick="togglePw()" type="button" tabindex="-1" aria-label="Toggle password visibility">
          <svg id="pwEye" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>

      <div class="login-error" id="loginError">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
        Incorrect password — try again.
      </div>

      <button class="login-btn" onclick="attemptLogin()">Sign In</button>
    </div>

    <a href="index.html" class="login-back">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      Back to website
    </a>
  </div>

  <!-- ══ ADMIN LAYOUT ══ -->
  <div class="admin-layout" id="adminPanel">

    <!-- Header -->
    <header class="admin-header">
      <div class="admin-header-brand">
        <img src="assets/Logo.jpg" alt="Logo" class="admin-header-logo"/>
        <div>
          <div class="admin-header-title">Rhandzu's Decor</div>
          <div class="admin-header-sub">Studio Admin</div>
        </div>
      </div>
      <div class="admin-header-actions">
        <a href="index.html" class="view-site-btn" target="_blank">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          View Site
        </a>
        <button class="logout-btn" onclick="logout()">Sign Out</button>
      </div>
    </header>

    <!-- Status bar -->
    <div class="status-bar" id="statusBar"></div>

    <!-- Body -->
    <div class="admin-body">

      <!-- ── New Post ── -->
      <div class="admin-section-title">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New Post
      </div>

      <!-- Upload zone -->
      <div class="upload-zone" id="uploadZone"
        onclick="triggerFileInput()"
        ondragover="handleDragOver(event)"
        ondrop="handleDrop(event)"
        ondragleave="handleDragLeave()">
        <div class="upload-zone-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>
        </div>
        <div class="upload-zone-label">
          <strong>Tap to choose photos</strong><br/>
          or drag &amp; drop here
        </div>
        <div class="upload-zone-hint">JPG · PNG · WEBP · Multiple allowed</div>
      </div>
      <input type="file" id="fileInput" accept="image/*" multiple
        onchange="onFileChange(this)" style="display:none"/>

      <!-- Preview -->
      <div class="preview-grid" id="previewGrid"></div>

      <!-- Form fields -->
      <div class="form-group">
        <label class="form-label" for="postCategory">Event Category *</label>
        <select class="form-select" id="postCategory">
          <option value="">Select a category…</option>
          <option>Wedding</option>
          <option>Kiddies Party</option>
          <option>Baby Shower</option>
          <option>Party</option>
          <option>Other</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label" for="postTitle">Title</label>
        <input type="text" class="form-input" id="postTitle"
          placeholder="e.g. Beige Themed Wedding · Centurion"/>
      </div>

      <div class="form-group">
        <label class="form-label" for="postDesc">Description
          <span style="opacity:0.4;font-style:italic;text-transform:none;letter-spacing:0">&nbsp;optional</span>
        </label>
        <textarea class="form-textarea" id="postDesc"
          placeholder="What's included — backdrop, balloon arch, catering, jumping castle…"></textarea>
      </div>

      <button class="publish-btn" id="submitBtn" onclick="submitPost()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        Publish Post
      </button>

      <hr class="admin-divider"/>

      <!-- ── Manage Posts ── -->
      <div class="admin-section-title">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        Manage Posts
      </div>
      <div id="adminPostList"></div>

    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="js/admin.js"></script>
  <script>
    // Password visibility toggle
    function togglePw() {
      const inp = document.getElementById('loginPassword');
      const eye = document.getElementById('pwEye');
      if (inp.type === 'password') {
        inp.type = 'text';
        eye.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
      } else {
        inp.type = 'password';
        eye.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
      }
    }
  </script>
</body>
</html>
